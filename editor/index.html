<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Note editor — Michael Mace</title>
    <link rel="icon" href="/favicon.png" />
    <meta http-equiv="refresh" content="0; url=../notes/index.html" />
  </head>
  <body>
    <p><a id="redirect" href="../notes/index.html">Continue to notes</a></p>
    <script>
      const params = new URLSearchParams(window.location.search)
      const slug = params.get('slug')
      const dest = new URL('../notes/index.html', window.location.href)
      if (slug) dest.searchParams.set('edit', slug)
      else if (params.get('new') === '1') dest.searchParams.set('new', '1')
      window.location.replace(dest.pathname + dest.search)
    </script>
  </body>
</html>

    <h1 class="no-margin-bottom">feed editor</h1>
    <p class="subtle" style="margin-top: 0.45rem">
      local-only helper for <code>feed/data.json</code>. keep source urls when
      you embed external content (if omitted, save falls back to external
      embed/image urls).
    </p>
    <p class="gif-editor-toolbar feed-editor-toolbar">
      <button type="button" id="load-btn" class="editor-toolbar-btn">reload</button>
      <button
        type="button"
        id="add-feed-popover-btn"
        class="editor-toolbar-btn"
        popovertarget="add-feed-popover"
      >
        Add entry
      </button>
      <button type="button" id="validate-btn" class="editor-toolbar-btn">validate</button>
      <button type="button" id="save-btn" class="editor-toolbar-btn editor-toolbar-btn--primary">save</button>
      <a href="../feed/index.html" class="editor-toolbar-btn feed-editor-open-link">open feed</a>
    </p>

    <div
      id="add-feed-popover"
      popover="auto"
      class="editor-popover editor-popover--scrollable"
      aria-labelledby="add-feed-popover-title"
    >
      <div class="editor-popover-scroll">
      <p id="add-feed-popover-title" class="editor-popover__title">Add entry</p>
      <p class="editor-popover-hint">Inserts at the top of the JSON — review and save.</p>
      <div class="editor-popover-field">
        <label for="quick-date">Date</label>
        <input type="date" id="quick-date" />
      </div>
      <div class="editor-popover-field">
        <label for="quick-title">Title (optional)</label>
        <input
          type="text"
          id="quick-title"
          placeholder="watched / read / build note"
        />
      </div>
      <div class="editor-popover-field">
        <label for="quick-body">Body (markdown)</label>
        <textarea
          id="quick-body"
          rows="4"
          placeholder="short note, thought, or tiny artifact"
        ></textarea>
      </div>
      <div class="editor-popover-field">
        <label for="quick-source">Source URL (optional)</label>
        <input type="url" id="quick-source" placeholder="https://..." />
      </div>
      <div class="editor-popover-field">
        <label for="quick-image">Image URL (optional)</label>
        <input type="text" id="quick-image" placeholder="/feed/images/..." />
      </div>
      <div class="editor-popover-field">
        <label for="quick-images">Image URLs (optional, comma separated)</label>
        <input
          type="text"
          id="quick-images"
          placeholder="/feed/images/a.jpg, /feed/images/b.jpg"
        />
      </div>
      <div class="editor-popover-field">
        <label for="quick-tags">Tags (optional, comma separated)</label>
        <input type="text" id="quick-tags" placeholder="reading, tools" />
      </div>
      <details class="editor-popover-advanced">
        <summary>Media &amp; links (optional)</summary>
        <div class="editor-popover-field">
          <label for="quick-video">Video URL</label>
          <input type="text" id="quick-video" placeholder="/feed/images/...mp4" />
        </div>
        <div class="editor-popover-field">
          <label for="quick-media-fit">Media fit</label>
          <select id="quick-media-fit">
            <option value="">default (contain)</option>
            <option value="contain">contain</option>
            <option value="cover">cover</option>
          </select>
        </div>
        <div class="editor-popover-field">
          <label for="quick-media-ratio">Media ratio</label>
          <input type="text" id="quick-media-ratio" placeholder="4:3" />
        </div>
        <div class="editor-popover-field">
          <label for="quick-media-max-width">Media max width (px)</label>
          <input
            type="number"
            min="1"
            step="1"
            id="quick-media-max-width"
            placeholder="420"
          />
        </div>
        <div class="editor-popover-field">
          <label for="quick-related-url">Related link URL</label>
          <input
            type="text"
            id="quick-related-url"
            placeholder="/notes/slug.html or https://..."
          />
        </div>
        <div class="editor-popover-field">
          <label for="quick-related-label">Related link label</label>
          <input type="text" id="quick-related-label" placeholder="note: ..." />
        </div>
      </details>
      </div>
      <div class="editor-popover-actions">
        <button type="button" id="quick-add-btn" class="editor-btn editor-btn--primary">Add to feed</button>
        <button
          type="button"
          class="editor-btn editor-btn--ghost"
          popovertarget="add-feed-popover"
          popovertargetaction="hide"
        >
          Cancel
        </button>
      </div>
    </div>

    <textarea
      id="feed-json"
      rows="28"
      spellcheck="false"
      style="width: 100%; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.92rem; line-height: 1.45"
    ></textarea>

    <p id="message" class="gif-editor-message" aria-live="polite"></p>

    <script>
      const EDITOR_PORT = 3002
      const isLocal =
        /^localhost$|^127\.0\.0\.1$/.test(location.hostname) ||
        location.hostname === ''
      const apiBase =
        isLocal && String(location.port) !== String(EDITOR_PORT)
          ? location.protocol + '//' + location.hostname + ':' + EDITOR_PORT
          : ''

      const jsonEl = document.getElementById('feed-json')
      const messageEl = document.getElementById('message')
      const loadBtn = document.getElementById('load-btn')
      const validateBtn = document.getElementById('validate-btn')
      const saveBtn = document.getElementById('save-btn')
      const quickDateEl = document.getElementById('quick-date')
      const quickTitleEl = document.getElementById('quick-title')
      const quickBodyEl = document.getElementById('quick-body')
      const quickSourceEl = document.getElementById('quick-source')
      const quickImageEl = document.getElementById('quick-image')
      const quickImagesEl = document.getElementById('quick-images')
      const quickVideoEl = document.getElementById('quick-video')
      const quickMediaFitEl = document.getElementById('quick-media-fit')
      const quickMediaRatioEl = document.getElementById('quick-media-ratio')
      const quickMediaMaxWidthEl = document.getElementById('quick-media-max-width')
      const quickTagsEl = document.getElementById('quick-tags')
      const quickRelatedUrlEl = document.getElementById('quick-related-url')
      const quickRelatedLabelEl = document.getElementById('quick-related-label')
      const quickAddBtn = document.getElementById('quick-add-btn')
      const addFeedPopover = document.getElementById('add-feed-popover')

      function setMessage(text, isError) {
        messageEl.textContent = text
        messageEl.classList.toggle('gif-editor-message--error', !!isError)
      }

      function todayIso() {
        return new Date().toISOString().slice(0, 10)
      }

      function slugify(value) {
        return String(value == null ? '' : value)
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '')
      }

      function parseTags(value) {
        return String(value == null ? '' : value)
          .split(',')
          .map((tag) => tag.trim())
          .filter(Boolean)
      }

      function parseCsvUrls(value) {
        return String(value == null ? '' : value)
          .split(',')
          .map((part) => part.trim())
          .filter(Boolean)
      }

      function isHttpUrl(value) {
        return /^https?:\/\//i.test(String(value == null ? '' : value).trim())
      }

      function isSafeHref(value) {
        return /^(https?:\/\/|\/|\.{1,2}\/)/i.test(
          String(value == null ? '' : value).trim()
        )
      }

      function isYouTubeUrl(value) {
        try {
          const url = new URL(String(value == null ? '' : value).trim())
          const host = url.hostname.replace(/^www\./, '').toLowerCase()
          return host === 'youtube.com' || host === 'm.youtube.com' || host === 'youtu.be'
        } catch (_) {
          return false
        }
      }

      function buildUniqueId(date, title, existingItems) {
        const safeDate = /^\d{4}-\d{2}-\d{2}$/.test(date) ? date : todayIso()
        const base = slugify(title) || 'entry'
        const existingIds = new Set(
          (Array.isArray(existingItems) ? existingItems : [])
            .map((item) => (item && typeof item.id === 'string' ? item.id.trim() : ''))
            .filter(Boolean)
        )
        let candidate = `${safeDate}-${base}`
        let n = 2
        while (existingIds.has(candidate)) {
          candidate = `${safeDate}-${base}-${n}`
          n += 1
        }
        return candidate
      }

      function stripTrailingCommas(jsonStr) {
        return jsonStr.replace(/,(\s*[}\]])/g, '$1')
      }

      function isPlainObject(value) {
        return !!value && typeof value === 'object' && !Array.isArray(value)
      }

      function hasAnyContent(item) {
        const title = typeof item.title === 'string' ? item.title.trim() : ''
        const bodyMd = typeof item.body_md === 'string' ? item.body_md.trim() : ''
        const sourceUrl = typeof item.source_url === 'string' ? item.source_url.trim() : ''
        const imageUrl = typeof item.image_url === 'string' ? item.image_url.trim() : ''
        const imageUrls = Array.isArray(item.image_urls)
          ? item.image_urls
              .map((url) => (typeof url === 'string' ? url.trim() : ''))
              .filter(Boolean)
          : []
        const videoUrl = typeof item.video_url === 'string' ? item.video_url.trim() : ''
        const hasEmbed = !!(
          item.embed &&
          typeof item.embed === 'object' &&
          typeof item.embed.url === 'string' &&
          item.embed.url.trim()
        )
        const hasRelatedLinks = Array.isArray(item.related_links) && item.related_links.length > 0
        return !!(
          title ||
          bodyMd ||
          sourceUrl ||
          imageUrl ||
          imageUrls.length > 0 ||
          videoUrl ||
          hasEmbed ||
          hasRelatedLinks
        )
      }

      function validateFeedData(data) {
        const errors = []
        const warnings = []
        if (!isPlainObject(data)) {
          errors.push('top-level value must be an object.')
          return { errors, warnings }
        }
        if (!Array.isArray(data.items)) {
          errors.push('top-level "items" must be an array.')
          return { errors, warnings }
        }

        const seenIds = new Set()
        data.items.forEach((item, index) => {
          const row = index + 1
          if (!isPlainObject(item)) {
            errors.push(`items[${row}] must be an object.`)
            return
          }

          const id = typeof item.id === 'string' ? item.id.trim() : ''
          const date = typeof item.date === 'string' ? item.date.trim() : ''
          if (!id) {
            errors.push(`items[${row}] is missing id.`)
          } else {
            if (seenIds.has(id)) {
              errors.push(`items[${row}] has duplicate id "${id}".`)
            }
            seenIds.add(id)
            if (!/^[a-z0-9][a-z0-9._-]*$/.test(id)) {
              warnings.push(
                `items[${row}] id "${id}" is unusual; lowercase letters, numbers, ".", "_" and "-" are safest.`
              )
            }
          }

          if (!date) {
            errors.push(`items[${row}] is missing date.`)
          } else if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
            errors.push(`items[${row}] date "${date}" must use YYYY-MM-DD.`)
          }

          if (!hasAnyContent(item)) {
            errors.push(
              `items[${row}] needs content (title, body_md, source_url, image_url, embed, or related_links).`
            )
          }

          const sourceUrl = typeof item.source_url === 'string' ? item.source_url.trim() : ''
          const imageUrl = typeof item.image_url === 'string' ? item.image_url.trim() : ''
          const imageUrls = Array.isArray(item.image_urls)
            ? item.image_urls
                .map((url) => (typeof url === 'string' ? url.trim() : ''))
                .filter(Boolean)
            : []
          const videoUrl = typeof item.video_url === 'string' ? item.video_url.trim() : ''

          if (sourceUrl && !isSafeHref(sourceUrl)) {
            errors.push(`items[${row}] source_url is not a safe URL/path.`)
          }
          if (imageUrl && !isSafeHref(imageUrl)) {
            errors.push(`items[${row}] image_url is not a safe URL/path.`)
          }
          if (item.image_urls != null) {
            if (!Array.isArray(item.image_urls)) {
              errors.push(`items[${row}] image_urls must be an array when present.`)
            } else {
              imageUrls.forEach((url, imageIndex) => {
                if (!isSafeHref(url)) {
                  errors.push(
                    `items[${row}] image_urls[${imageIndex + 1}] is not a safe URL/path.`
                  )
                }
              })
            }
          }
          if (videoUrl && !isSafeHref(videoUrl)) {
            errors.push(`items[${row}] video_url is not a safe URL/path.`)
          }

          if (item.embed != null) {
            if (!isPlainObject(item.embed)) {
              errors.push(`items[${row}] embed must be an object when present.`)
            } else {
              const embedType = typeof item.embed.type === 'string' ? item.embed.type.trim() : ''
              const embedUrl = typeof item.embed.url === 'string' ? item.embed.url.trim() : ''
              if (!embedType) errors.push(`items[${row}] embed.type is required when embed is set.`)
              if (!embedUrl) errors.push(`items[${row}] embed.url is required when embed is set.`)
              if (embedUrl && !isSafeHref(embedUrl)) {
                errors.push(`items[${row}] embed.url is not a safe URL/path.`)
              }
              if (embedType && embedType !== 'youtube') {
                warnings.push(
                  `items[${row}] embed.type "${embedType}" is not auto-rendered on the feed page (youtube only).`
                )
              }
              if (embedUrl && isHttpUrl(embedUrl) && !sourceUrl) {
                warnings.push(
                  `items[${row}] has an external embed without source_url; save will backfill source_url.`
                )
              }
            }
          }

          if (imageUrl && isHttpUrl(imageUrl) && !sourceUrl) {
            warnings.push(
              `items[${row}] has an external image without source_url; save will backfill source_url.`
            )
          }
          if (imageUrls.some((url) => isHttpUrl(url)) && !sourceUrl) {
            warnings.push(
              `items[${row}] has external image_urls without source_url; save will backfill source_url.`
            )
          }
          if (videoUrl && isHttpUrl(videoUrl) && !sourceUrl) {
            warnings.push(
              `items[${row}] has an external video without source_url; save will backfill source_url.`
            )
          }
          if (item.media_fit != null) {
            const fit = String(item.media_fit).trim()
            if (fit !== 'contain' && fit !== 'cover') {
              errors.push(`items[${row}] media_fit must be "contain" or "cover".`)
            }
          }
          if (item.media_ratio != null) {
            const ratio = String(item.media_ratio).trim()
            if (!/^\d{1,2}\s*[:/]\s*\d{1,2}$/.test(ratio)) {
              errors.push(`items[${row}] media_ratio must look like 4:3, 1:1, or 16:9.`)
            }
          }
          if (item.media_max_width != null) {
            const width = Number(item.media_max_width)
            if (!Number.isFinite(width) || width <= 0) {
              errors.push(`items[${row}] media_max_width must be a positive number.`)
            }
          }

          if (item.tags != null) {
            if (!Array.isArray(item.tags)) {
              errors.push(`items[${row}] tags must be an array when present.`)
            } else {
              item.tags.forEach((tag, tagIndex) => {
                if (typeof tag !== 'string' || !tag.trim()) {
                  errors.push(`items[${row}] tags[${tagIndex + 1}] must be a non-empty string.`)
                }
              })
            }
          }

          if (item.related_links != null) {
            if (!Array.isArray(item.related_links)) {
              errors.push(`items[${row}] related_links must be an array when present.`)
            } else {
              item.related_links.forEach((link, linkIndex) => {
                if (!isPlainObject(link)) {
                  errors.push(
                    `items[${row}] related_links[${linkIndex + 1}] must be an object with url.`
                  )
                  return
                }
                const url = typeof link.url === 'string' ? link.url.trim() : ''
                if (!url) {
                  errors.push(`items[${row}] related_links[${linkIndex + 1}] is missing url.`)
                } else if (!isSafeHref(url)) {
                  errors.push(`items[${row}] related_links[${linkIndex + 1}] has an unsafe url.`)
                }
              })
            }
          }
        })

        return { errors, warnings }
      }

      function summarizeValidation(report) {
        const parts = []
        if (report.errors.length > 0) {
          const firstErrors = report.errors.slice(0, 3).join(' ')
          const extraErrors =
            report.errors.length > 3
              ? ` (+${report.errors.length - 3} more error${report.errors.length - 3 === 1 ? '' : 's'})`
              : ''
          parts.push(`errors: ${firstErrors}${extraErrors}`)
        }
        if (report.warnings.length > 0) {
          const firstWarnings = report.warnings.slice(0, 2).join(' ')
          const extraWarnings =
            report.warnings.length > 2
              ? ` (+${report.warnings.length - 2} more warning${report.warnings.length - 2 === 1 ? '' : 's'})`
              : ''
          parts.push(`warnings: ${firstWarnings}${extraWarnings}`)
        }
        if (parts.length === 0) return 'Validation passed.'
        return parts.join(' | ')
      }

      function parseEditorJson() {
        try {
          const parsed = JSON.parse(stripTrailingCommas(jsonEl.value))
          if (!parsed || typeof parsed !== 'object') {
            throw new Error('Top-level value must be an object.')
          }
          if (!Array.isArray(parsed.items)) {
            throw new Error('Expected an items array.')
          }
          return { ok: true, data: parsed }
        } catch (err) {
          return { ok: false, error: err.message }
        }
      }

      let saveInProgress = false
      async function loadData() {
        if (saveInProgress) return
        setMessage('Loading...')
        try {
          const res = await fetch(apiBase + '/api/feed/data')
          const data = await res.json().catch(() => ({}))
          if (!res.ok) {
            const detail = data.detail ? ': ' + data.detail : ''
            setMessage((data.error || 'Load failed') + detail, true)
            return
          }
          jsonEl.value = JSON.stringify(
            { items: Array.isArray(data.items) ? data.items : [] },
            null,
            2
          )
          setMessage('')
        } catch (err) {
          setMessage(
            'Request failed: ' +
              err.message +
              '. Is the editor server running on port 3002?',
            true
          )
        }
      }

      quickAddBtn.addEventListener('click', () => {
        const current = parseEditorJson()
        if (!current.ok) {
          setMessage('Invalid JSON: ' + current.error, true)
          return
        }
        const data = current.data
        if (!Array.isArray(data.items)) data.items = []

        const date = (quickDateEl.value || todayIso()).trim()
        const title = quickTitleEl.value.trim()
        const bodyMd = quickBodyEl.value.trim()
        const sourceUrl = quickSourceEl.value.trim()
        const imageUrl = quickImageEl.value.trim()
        const imageUrls = parseCsvUrls(quickImagesEl.value)
        const videoUrl = quickVideoEl.value.trim()
        const mediaFit = quickMediaFitEl.value.trim()
        const mediaRatio = quickMediaRatioEl.value.trim()
        const mediaMaxWidthRaw = quickMediaMaxWidthEl.value.trim()
        const tags = parseTags(quickTagsEl.value)
        const relatedUrl = quickRelatedUrlEl.value.trim()
        const relatedLabel = quickRelatedLabelEl.value.trim()

        if (
          !title &&
          !bodyMd &&
          !sourceUrl &&
          !imageUrl &&
          imageUrls.length === 0 &&
          !videoUrl
        ) {
          setMessage(
            'Add at least one of: title, body, source url, image url(s), or video url.',
            true
          )
          return
        }

        const item = {
          id: buildUniqueId(date, title || bodyMd, data.items),
          date,
        }
        if (title) item.title = title
        if (bodyMd) item.body_md = bodyMd
        if (sourceUrl) {
          item.source_url = sourceUrl
          if (isHttpUrl(sourceUrl) && isYouTubeUrl(sourceUrl)) {
            item.embed = { type: 'youtube', url: sourceUrl }
          }
        }
        if (imageUrl) item.image_url = imageUrl
        if (imageUrls.length > 0) item.image_urls = imageUrls
        if (videoUrl) item.video_url = videoUrl
        if (mediaFit) item.media_fit = mediaFit
        if (mediaRatio) item.media_ratio = mediaRatio
        if (mediaMaxWidthRaw) item.media_max_width = Number(mediaMaxWidthRaw)
        if (tags.length > 0) item.tags = tags
        if (relatedUrl) {
          item.related_links = relatedLabel
            ? [{ label: relatedLabel, url: relatedUrl }]
            : [{ url: relatedUrl }]
        }

        data.items.unshift(item)
        jsonEl.value = JSON.stringify(data, null, 2)
        setMessage('Added new item at the top. review the JSON, then save.')

        quickTitleEl.value = ''
        quickBodyEl.value = ''
        quickSourceEl.value = ''
        quickImageEl.value = ''
        quickImagesEl.value = ''
        quickVideoEl.value = ''
        quickMediaFitEl.value = ''
        quickMediaRatioEl.value = ''
        quickMediaMaxWidthEl.value = ''
        quickTagsEl.value = ''
        quickRelatedUrlEl.value = ''
        quickRelatedLabelEl.value = ''
        if (addFeedPopover && typeof addFeedPopover.hidePopover === 'function') {
          addFeedPopover.hidePopover()
        }
      })

      if (addFeedPopover) {
        if (typeof addFeedPopover.hidePopover === 'function') addFeedPopover.hidePopover()
        document.body.style.overflow = ''
        addFeedPopover.addEventListener('toggle', (ev) => {
          if (ev.newState === 'open') {
            document.body.style.overflow = 'hidden'
            setMessage('')
            if (quickDateEl && !quickDateEl.value) quickDateEl.value = todayIso()
            setTimeout(() => {
              if (quickTitleEl) quickTitleEl.focus()
            }, 0)
          } else if (ev.newState === 'closed') {
            document.body.style.overflow = ''
          }
        })
      }

      validateBtn.addEventListener('click', () => {
        const parsed = parseEditorJson()
        if (!parsed.ok) {
          setMessage('Invalid JSON: ' + parsed.error, true)
          return
        }
        const report = validateFeedData(parsed.data)
        if (report.errors.length > 0) {
          setMessage(summarizeValidation(report), true)
          return
        }
        setMessage(summarizeValidation(report), false)
      })

      saveBtn.addEventListener('click', async () => {
        if (saveInProgress) return
        const parsed = parseEditorJson()
        if (!parsed.ok) {
          setMessage('Invalid JSON: ' + parsed.error, true)
          return
        }
        const validation = validateFeedData(parsed.data)
        if (validation.errors.length > 0) {
          setMessage(summarizeValidation(validation), true)
          return
        }
        saveInProgress = true
        saveBtn.disabled = true
        setMessage('Saving...')
        try {
          const res = await fetch(apiBase + '/api/feed/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(parsed.data),
          })
          const data = await res.json().catch(() => ({}))
          if (!res.ok) {
            const detail = data.detail ? ': ' + data.detail : ''
            setMessage((data.error || 'Save failed') + detail, true)
            return
          }
          jsonEl.value = JSON.stringify(
            { items: Array.isArray(parsed.data.items) ? parsed.data.items : [] },
            null,
            2
          )
          const count = typeof data.count === 'number' ? data.count : null
          const warningText =
            validation.warnings.length > 0
              ? ` (${validation.warnings.length} warning${
                  validation.warnings.length === 1 ? '' : 's'
                })`
              : ''
          setMessage(
            count == null ? `Saved.${warningText}` : `Saved ${count} item(s).${warningText}`
          )
        } catch (err) {
          setMessage('Request failed: ' + err.message, true)
        } finally {
          saveInProgress = false
          saveBtn.disabled = false
        }
      })

      loadBtn.addEventListener('click', loadData)
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') loadData()
      })
      window.addEventListener('pageshow', (e) => {
        if (e.persisted) loadData()
      })
      if (quickDateEl && !quickDateEl.value) quickDateEl.value = todayIso()
      loadData()

      if (isLocal) {
        const notesNavWrap = document.getElementById('notes-nav-wrap')
        if (notesNavWrap) notesNavWrap.classList.remove('hidden')
        const gifsNavWrap = document.getElementById('gifs-nav-wrap')
        if (gifsNavWrap) gifsNavWrap.classList.remove('hidden')
      }
    </script>
  </body>
</html>

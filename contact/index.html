    <main class="page-body">
      <section class="contact-intro" aria-labelledby="contact-title">
        <h1 id="contact-title" class="no-margin-bottom">Contact</h1>
        <p class="subtle">
          a project, some work, or just hi — send a note and i'll get back to
          you.
        </p>
      </section>

      <form id="contact-form" class="contact-form" novalidate>
        <p class="contact-honeypot" aria-hidden="true">
          <label for="website">Website</label>
          <input
            type="text"
            id="website"
            name="website"
            tabindex="-1"
            autocomplete="off"
          />
        </p>

        <p>
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            maxlength="100"
            autocomplete="name"
          />
        </p>

        <p>
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            maxlength="254"
            autocomplete="email"
          />
        </p>

        <p>
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            required
            maxlength="5000"
            rows="8"
          ></textarea>
        </p>

        <p>
          <button type="submit" id="contact-submit">Send message</button>
        </p>

        <p
          id="contact-status"
          class="contact-status"
          role="status"
          aria-live="polite"
          hidden
        ></p>
      </form>
    </main>

    <script>
      window.va =
        window.va ||
        function () {
          ;(window.vaq = window.vaq || []).push(arguments)
        }
    </script>
    <script defer src="/<unique-path>/script.js"></script>

    <script>
      ;(function () {
        const form = document.getElementById('contact-form')
        const submitBtn = document.getElementById('contact-submit')
        const statusEl = document.getElementById('contact-status')

        function showStatus(message, isError) {
          statusEl.hidden = false
          statusEl.textContent = message
          statusEl.classList.toggle('contact-status--error', !!isError)
          statusEl.classList.toggle('contact-status--success', !isError)
        }

        form.addEventListener('submit', async function (event) {
          event.preventDefault()
          statusEl.hidden = true

          const payload = {
            name: form.name.value,
            email: form.email.value,
            message: form.message.value,
            website: form.website.value,
          }

          submitBtn.disabled = true
          submitBtn.textContent = 'Sending…'

          try {
            const response = await fetch('/api/contact', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            })

            const data = await response.json().catch(function () {
              return {}
            })

            if (response.ok) {
              form.reset()
              showStatus('Thanks — your message was sent.', false)
            } else {
              showStatus(
                data.error || 'Could not send message. Please try again.',
                true
              )
            }
          } catch (_) {
            showStatus('Could not send message. Please try again.', true)
          } finally {
            submitBtn.disabled = false
            submitBtn.textContent = 'Send message'
          }
        })

        if (
          /^localhost$|^127\.0\.0\.1$/.test(window.location.hostname) ||
          window.location.hostname === ''
        ) {
          const notesNavWrap = document.getElementById('notes-nav-wrap')
          if (notesNavWrap) notesNavWrap.classList.remove('hidden')
          const gifsNavWrap = document.getElementById('gifs-nav-wrap')
          if (gifsNavWrap) gifsNavWrap.classList.remove('hidden')
          const feedNavWrap = document.getElementById('feed-nav-wrap')
          if (feedNavWrap) feedNavWrap.classList.remove('hidden')
        }
      })()
    </script>

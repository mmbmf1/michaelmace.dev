<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Feed - Michael Mace</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" href="/favicon.png" />
    <meta name="color-scheme" content="light dark" />
  </head>

  <body>
    <header class="page-header">
      <p class="nav-links">
        <a href="../index.html">Home</a> ·
        <a href="../notes/index.html">Notes</a> · <a href="index.html" class="active">Feed</a> ·
        <a href="../gifs/index.html">GIFs</a>
        ·
        <a
          href="https://github.com/mmbmf1"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        ><span id="feed-edit-wrap" class="nav-edit-wrap hidden"> · <a id="feed-editor-link" href="/editor/feed.html" class="local-edit nav-inline-edit-link" aria-label="Edit feed" title="Open feed editor (local)">edit</a></span>
      </p>
    </header>

    <main class="page-body">
      <section class="feed-intro" aria-labelledby="feed-title">
        <h1 id="feed-title" class="no-margin-bottom">feed</h1>
        <p class="subtle">small logbook entries from the lab.</p>
      </section>

      <section id="feed-filter" class="feed-filter hidden" aria-live="polite"></section>

      <section id="feed-list" class="feed-list" aria-live="polite"></section>
    </main>

    <script>
      function escapeHtml(text) {
        return String(text == null ? '' : text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }

      function isSafeHref(href) {
        if (typeof href !== 'string') return false
        return /^(https?:\/\/|\/|\.{1,2}\/)/i.test(href.trim())
      }

      function addInlineStyles(text) {
        return text
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      }

      function renderInlineMd(text) {
        const raw = String(text == null ? '' : text)
        const linkRegex = /\[([^\]]+)\]\(([^)\s]+)\)/g
        let html = ''
        let last = 0
        let match
        while ((match = linkRegex.exec(raw))) {
          html += addInlineStyles(escapeHtml(raw.slice(last, match.index)))
          const label = addInlineStyles(escapeHtml(match[1]))
          const href = match[2].trim()
          if (isSafeHref(href)) {
            const external = /^https?:\/\//i.test(href)
            html += `<a href="${escapeHtml(href)}"${
              external ? ' target="_blank" rel="noopener noreferrer"' : ''
            }>${label}</a>`
          } else {
            html += addInlineStyles(escapeHtml(match[0]))
          }
          last = match.index + match[0].length
        }
        html += addInlineStyles(escapeHtml(raw.slice(last)))
        return html
      }

      function renderBodyMd(bodyMd) {
        const content = String(bodyMd == null ? '' : bodyMd).trim()
        if (!content) return ''
        const lines = content.split('\n')
        const blocks = []

        function isFenceStart(line) {
          return line.trim().startsWith('```')
        }

        function isHeading(line) {
          return /^#{1,6}\s+/.test(line.trim())
        }

        function isBlockquote(line) {
          return /^>\s?/.test(line.trim())
        }

        function isUnorderedListItem(line) {
          return /^-\s+/.test(line.trim())
        }

        function isOrderedListItem(line) {
          return /^\d+\.\s+/.test(line.trim())
        }

        function isBlockStart(line) {
          return (
            isFenceStart(line) ||
            isHeading(line) ||
            isBlockquote(line) ||
            isUnorderedListItem(line) ||
            isOrderedListItem(line)
          )
        }

        let i = 0
        while (i < lines.length) {
          const rawLine = lines[i]
          const trimmed = rawLine.trim()

          if (!trimmed) {
            i += 1
            continue
          }

          if (isFenceStart(rawLine)) {
            const langInput = trimmed.slice(3).trim().toLowerCase()
            const lang = langInput.replace(/[^a-z0-9_-]/g, '')
            const codeLines = []
            i += 1
            while (i < lines.length && !isFenceStart(lines[i])) {
              codeLines.push(lines[i])
              i += 1
            }
            if (i < lines.length && isFenceStart(lines[i])) i += 1
            blocks.push(
              `<pre><code${
                lang ? ` class="language-${escapeHtml(lang)}"` : ''
              }>${escapeHtml(codeLines.join('\n'))}</code></pre>`
            )
            continue
          }

          if (isHeading(rawLine)) {
            const match = trimmed.match(/^(#{1,6})\s+(.+)$/)
            if (match) {
              const level = String(match[1].length)
              blocks.push(`<h${level}>${renderInlineMd(match[2])}</h${level}>`)
              i += 1
              continue
            }
          }

          if (isBlockquote(rawLine)) {
            const quoteLines = []
            while (i < lines.length && isBlockquote(lines[i])) {
              quoteLines.push(lines[i].trim().replace(/^>\s?/, ''))
              i += 1
            }
            blocks.push(
              `<blockquote><p>${quoteLines.map(renderInlineMd).join('<br />')}</p></blockquote>`
            )
            continue
          }

          if (isUnorderedListItem(rawLine)) {
            const items = []
            while (i < lines.length && isUnorderedListItem(lines[i])) {
              items.push(
                `<li>${renderInlineMd(lines[i].trim().replace(/^-\s+/, ''))}</li>`
              )
              i += 1
            }
            blocks.push(`<ul>${items.join('')}</ul>`)
            continue
          }

          if (isOrderedListItem(rawLine)) {
            const items = []
            while (i < lines.length && isOrderedListItem(lines[i])) {
              items.push(
                `<li>${renderInlineMd(
                  lines[i].trim().replace(/^\d+\.\s+/, '')
                )}</li>`
              )
              i += 1
            }
            blocks.push(`<ol>${items.join('')}</ol>`)
            continue
          }

          const paragraphLines = []
          while (i < lines.length) {
            const paragraphCandidate = lines[i]
            if (!paragraphCandidate.trim()) break
            if (
              paragraphLines.length > 0 &&
              isBlockStart(paragraphCandidate)
            ) {
              break
            }
            paragraphLines.push(paragraphCandidate)
            i += 1
          }
          blocks.push(`<p>${paragraphLines.map(renderInlineMd).join('<br />')}</p>`)
        }

        return blocks.join('')
      }

      function extractYouTubeId(urlValue) {
        if (typeof urlValue !== 'string' || !urlValue.trim()) return ''
        try {
          const url = new URL(urlValue)
          const host = url.hostname.replace(/^www\./, '')
          if (host === 'youtu.be') return url.pathname.replace('/', '').trim()
          if (host === 'youtube.com' || host === 'm.youtube.com') {
            if (url.pathname === '/watch') {
              return (url.searchParams.get('v') || '').trim()
            }
            if (url.pathname.startsWith('/shorts/')) {
              return url.pathname.split('/')[2] || ''
            }
            if (url.pathname.startsWith('/embed/')) {
              return url.pathname.split('/')[2] || ''
            }
          }
        } catch (_) {}
        return ''
      }

      function renderYouTubeEmbed(urlValue, mediaOptions) {
        const id = extractYouTubeId(urlValue)
        if (!id) return ''
        const src = `https://www.youtube.com/embed/${encodeURIComponent(id)}`
        return `<div class="feed-embed"><div class="feed-media-frame">${renderMediaFrame(
          `<iframe class="youtube-embed" src="${src}" title="YouTube video" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`,
          mediaOptions
        )}</div></div>`
      }

      function normalizeMediaFit(value) {
        const fit = String(value == null ? '' : value).trim().toLowerCase()
        if (fit === 'cover' || fit === 'contain') return fit
        return 'contain'
      }

      function normalizeMediaRatio(value) {
        const match = String(value == null ? '' : value)
          .trim()
          .match(/^(\d{1,2})\s*[:/]\s*(\d{1,2})$/)
        if (!match) return '4 / 3'
        const width = Number(match[1])
        const height = Number(match[2])
        if (!Number.isFinite(width) || !Number.isFinite(height)) return '4 / 3'
        if (width <= 0 || height <= 0) return '4 / 3'
        return `${width} / ${height}`
      }

      function normalizeMediaMaxWidth(value) {
        const numeric = typeof value === 'number' ? value : Number(String(value || '').trim())
        if (!Number.isFinite(numeric) || numeric <= 0) return 420
        return Math.round(numeric)
      }

      function mediaOptionsForItem(item) {
        return {
          fit: normalizeMediaFit(item && item.media_fit),
          ratio: normalizeMediaRatio(item && item.media_ratio),
          maxWidth: normalizeMediaMaxWidth(item && item.media_max_width),
        }
      }

      function renderMediaFrame(innerHtml, mediaOptions) {
        const opts = mediaOptions || {
          fit: 'contain',
          ratio: '4 / 3',
          maxWidth: 420,
        }
        return `<div class="feed-media-card" style="--feed-media-ratio: ${escapeHtml(
          opts.ratio
        )}; --feed-media-fit: ${escapeHtml(
          opts.fit
        )}; --feed-media-max-width: ${escapeHtml(
          String(opts.maxWidth)
        )}px;">${innerHtml}</div>`
      }

      function collectImageUrls(item) {
        const urls = []
        if (Array.isArray(item && item.image_urls)) {
          for (const value of item.image_urls) {
            const trimmed =
              typeof value === 'string' ? value.trim() : ''
            if (trimmed && isSafeHref(trimmed)) urls.push(trimmed)
          }
        }
        const singleImage =
          item && typeof item.image_url === 'string' ? item.image_url.trim() : ''
        if (singleImage && isSafeHref(singleImage) && urls.indexOf(singleImage) === -1) {
          urls.push(singleImage)
        }
        return urls
      }

      function renderImages(item, mediaOptions) {
        const imageUrls = collectImageUrls(item)
        if (imageUrls.length === 0) return ''
        if (imageUrls.length === 1) {
          return `<div class="feed-embed"><div class="feed-media-frame">${renderMediaFrame(
            `<img class="feed-image" src="${escapeHtml(
              imageUrls[0]
            )}" alt="" loading="lazy">`,
            mediaOptions
          )}</div></div>`
        }
        const cards = imageUrls
          .map((url) =>
            renderMediaFrame(
              `<img class="feed-image" src="${escapeHtml(
                url
              )}" alt="" loading="lazy">`,
              mediaOptions
            )
          )
          .join('')
        return `<div class="feed-embed"><div class="feed-media-carousel" role="region" aria-label="entry images">${cards}</div></div>`
      }

      function renderMediaRow(item, mediaOptions) {
        const imageUrls = collectImageUrls(item)
        const videoUrl =
          item && typeof item.video_url === 'string'
            ? item.video_url.trim()
            : ''
        const cards = []
        for (const url of imageUrls) {
          cards.push(
            renderMediaFrame(
              `<img class="feed-image" src="${escapeHtml(
                url
              )}" alt="" loading="lazy">`,
              mediaOptions
            )
          )
        }
        if (videoUrl && isSafeHref(videoUrl)) {
          cards.push(
            renderMediaFrame(
              `<video class="feed-video" src="${escapeHtml(
                videoUrl
              )}" controls muted loop playsinline autoplay preload="metadata"></video>`,
              mediaOptions
            )
          )
        }
        if (cards.length === 0) return ''
        if (cards.length === 1) {
          return `<div class="feed-embed"><div class="feed-media-frame">${cards[0]}</div></div>`
        }
        return `<div class="feed-embed"><div class="feed-media-carousel" role="region" aria-label="entry media">${cards.join(
          ''
        )}</div></div>`
      }

      function formatDate(value) {
        if (typeof value !== 'string' || !value.trim()) return ''
        const raw = value.trim()
        const iso = /^(\d{4})-(\d{2})-(\d{2})$/.exec(raw)
        const date = iso
          ? new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]))
          : new Date(raw)
        if (Number.isNaN(date.getTime())) return value
        return new Intl.DateTimeFormat(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
        }).format(date)
      }

      function sortableDateValue(value) {
        if (typeof value !== 'string' || !value.trim()) return null
        const raw = value.trim()
        const iso = /^(\d{4})-(\d{2})-(\d{2})$/.exec(raw)
        if (iso) {
          const local = new Date(
            Number(iso[1]),
            Number(iso[2]) - 1,
            Number(iso[3])
          )
          if (Number.isNaN(local.getTime())) return null
          return local.getTime()
        }
        const parsed = new Date(raw)
        if (Number.isNaN(parsed.getTime())) return null
        return parsed.getTime()
      }

      function sortFeedItemsByDate(items) {
        return items
          .map((item, index) => ({
            item,
            index,
            sortValue: sortableDateValue(item && item.date ? item.date : ''),
          }))
          .sort((a, b) => {
            const aHasDate = a.sortValue != null
            const bHasDate = b.sortValue != null
            if (aHasDate && bHasDate && a.sortValue !== b.sortValue) {
              return b.sortValue - a.sortValue
            }
            if (aHasDate !== bHasDate) return aHasDate ? -1 : 1
            return a.index - b.index
          })
          .map((entry) => entry.item)
      }

      function feedDateGroupKey(value) {
        if (typeof value !== 'string' || !value.trim()) return '__undated__'
        const raw = value.trim()
        if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw
        const parsed = new Date(raw)
        if (Number.isNaN(parsed.getTime())) return `raw:${raw}`
        return parsed.toISOString().slice(0, 10)
      }

      function feedDateGroupLabel(groupKey) {
        if (groupKey === '__undated__') return 'undated'
        if (groupKey.startsWith('raw:')) return groupKey.slice(4)
        return formatDate(groupKey)
      }

      function normalizeFeedItemId(rawId, index) {
        const fallback = `item-${index + 1}`
        if (typeof rawId !== 'string') return fallback
        const clean = rawId
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9._-]+/g, '-')
        return clean.replace(/^-+|-+$/g, '') || fallback
      }

      function normalizeTag(value) {
        return String(value == null ? '' : value)
          .trim()
          .toLowerCase()
          .replace(/\s+/g, '-')
      }

      function getTagFilterFromLocation() {
        const params = new URLSearchParams(window.location.search)
        return normalizeTag(params.get('tag') || '')
      }

      function itemHasTag(item, activeTag) {
        if (!activeTag) return true
        const tags = Array.isArray(item && item.tags) ? item.tags : []
        return tags.some((tag) => normalizeTag(tag) === activeTag)
      }

      function renderRelatedLinks(links) {
        if (!Array.isArray(links) || links.length === 0) return ''
        const safeLinks = links
          .filter(
            (link) =>
              link && typeof link.url === 'string' && isSafeHref(link.url)
          )
          .map((link) => {
            const label = link.label ? String(link.label) : String(link.url)
            const external = /^https?:\/\//i.test(link.url)
            return `<li><a href="${escapeHtml(link.url)}"${
              external ? ' target="_blank" rel="noopener noreferrer"' : ''
            }>${escapeHtml(label)}</a></li>`
          })
          .join('')
        return safeLinks
          ? `<div class="feed-related"><p class="feed-meta-label">related:</p><ul>${safeLinks}</ul></div>`
          : ''
      }

      function renderSource(sourceUrl) {
        if (!isSafeHref(sourceUrl || '')) return ''
        const external = /^https?:\/\//i.test(sourceUrl)
        return `<p class="feed-source">source: <a href="${escapeHtml(
          sourceUrl
        )}"${
          external ? ' target="_blank" rel="noopener noreferrer"' : ''
        }>${escapeHtml(sourceUrl)}</a></p>`
      }

      function renderTags(tags, activeTag) {
        if (!Array.isArray(tags) || tags.length === 0) return ''
        const clean = tags
          .map((tag) => String(tag || '').trim())
          .filter(Boolean)
          .map((tag) => {
            const normalized = normalizeTag(tag)
            if (!normalized) return ''
            const activeClass =
              activeTag && normalized === activeTag ? ' class="active"' : ''
            const href = `?tag=${encodeURIComponent(normalized)}`
            return `<li${activeClass}><a href="${href}">#${escapeHtml(
              tag
            )}</a></li>`
          })
          .join('')
        return clean ? `<ul class="feed-tags">${clean}</ul>` : ''
      }

      function renderItem(item, index, activeTag) {
        const title =
          item && item.title ? `<h2>${escapeHtml(item.title)}</h2>` : ''
        const body = renderBodyMd(item && item.body_md ? item.body_md : '')
        const mediaOptions = mediaOptionsForItem(item)
        const sourceUrlInput =
          item && typeof item.source_url === 'string'
            ? item.source_url.trim()
            : ''
        const embedUrlCandidate =
          item && item.embed && item.embed.type === 'youtube' && item.embed.url
            ? String(item.embed.url)
            : sourceUrlInput
        const embed = renderYouTubeEmbed(embedUrlCandidate, mediaOptions)
        const imageUrls = collectImageUrls(item)
        const videoUrl =
          item && typeof item.video_url === 'string'
            ? item.video_url.trim()
            : ''
        const firstImageUrl = imageUrls.length > 0 ? imageUrls[0] : ''
        const sourceUrl =
          sourceUrlInput ||
          (/^https?:\/\//i.test(embedUrlCandidate)
            ? embedUrlCandidate
            : /^https?:\/\//i.test(firstImageUrl)
            ? firstImageUrl
            : /^https?:\/\//i.test(videoUrl)
            ? videoUrl
            : '')
        const media = renderMediaRow(item, mediaOptions)
        const date = formatDate(item && item.date ? item.date : '')
        const itemId = normalizeFeedItemId(item && item.id, index)
        const dateLabel = date || 'undated'
        const tagsOnly = renderTags(item && item.tags, activeTag)
        const relatedLinks = renderRelatedLinks(item && item.related_links)
        return `<article id="${escapeHtml(
          itemId
        )}" class="feed-item"><div class="feed-item-head">${title}${tagsOnly}</div><p class="feed-date"><a class="feed-permalink" href="#${escapeHtml(
          itemId
        )}" aria-label="link to this entry">#</a> ${escapeHtml(
          dateLabel
        )}</p>${relatedLinks}<div class="feed-body">${body}</div>${media}${embed}${renderSource(
          sourceUrl
        )}</article>`
      }

      function renderGroupedFeed(items, activeTag) {
        const groups = []
        const byKey = new Map()
        for (const item of items) {
          const key = feedDateGroupKey(item && item.date ? item.date : '')
          if (!byKey.has(key)) {
            const group = { key, items: [] }
            byKey.set(key, group)
            groups.push(group)
          }
          byKey.get(key).items.push(item)
        }

        let runningIndex = 0
        return groups
          .map((group, groupIndex) => {
            const headingText = feedDateGroupLabel(group.key)
            const daySlug = String(group.key || headingText || 'undated')
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
            const dayId = `day-${daySlug || 'undated'}-${groupIndex + 1}`
            const count = group.items.length
            const countText = count === 1 ? '1 entry' : `${count} entries`
            const itemsHtml = group.items
              .map((item) => {
                const html = renderItem(item, runningIndex, activeTag)
                runningIndex += 1
                return html
              })
              .join('')
            return `<section class="feed-day-group" aria-labelledby="${escapeHtml(
              dayId
            )}"><h2 id="${escapeHtml(
              dayId
            )}" class="feed-day-heading">${escapeHtml(
              headingText
            )}<span class="feed-day-count">${escapeHtml(
              countText
            )}</span></h2><div class="feed-day-items">${itemsHtml}</div></section>`
          })
          .join('')
      }

      function renderTagFilterSummary(activeTag, itemCount, totalCount) {
        const wrap = document.getElementById('feed-filter')
        if (!wrap) return
        if (!activeTag) {
          wrap.classList.add('hidden')
          wrap.innerHTML = ''
          return
        }
        const label = itemCount === 1 ? '1 entry' : `${itemCount} entries`
        const totalLabel = totalCount === 1 ? '1 total' : `${totalCount} total`
        wrap.classList.remove('hidden')
        wrap.innerHTML = `<p><span class="feed-meta-label">filter:</span> #${escapeHtml(
          activeTag
        )} · ${escapeHtml(label)} (${escapeHtml(
          totalLabel
        )}) · <a href="index.html">clear</a></p>`
      }

      async function initFeed() {
        const list = document.getElementById('feed-list')
        if (!list) return
        try {
          const response = await fetch('data.json')
          if (!response.ok) throw new Error('bad response')
          const data = await response.json()
          const items = Array.isArray(data.items) ? data.items : []
          if (items.length === 0) {
            list.innerHTML = '<p class="subtle">no feed items yet.</p>'
            return
          }
          const activeTag = getTagFilterFromLocation()
          const sortedItems = sortFeedItemsByDate(items)
          const filteredItems = sortedItems.filter((item) =>
            itemHasTag(item, activeTag)
          )
          renderTagFilterSummary(activeTag, filteredItems.length, sortedItems.length)
          if (filteredItems.length === 0) {
            list.innerHTML = `<p class="subtle">no entries for #${escapeHtml(
              activeTag
            )} yet. <a href="index.html">clear filter</a>.</p>`
            return
          }
          list.innerHTML = renderGroupedFeed(filteredItems, activeTag)
        } catch (_) {
          list.innerHTML =
            '<p class="subtle">feed data did not load. check feed/data.json.</p>'
        }
      }

      const EDITOR_PORT = 3002
      const isLocal =
        /^localhost$|^127\.0\.0\.1$/.test(location.hostname) ||
        location.hostname === ''
      const editorOrigin =
        isLocal && String(location.port) !== String(EDITOR_PORT)
          ? location.protocol + '//' + location.hostname + ':' + EDITOR_PORT
          : ''

      initFeed()
      if (isLocal) {
        const editWrap = document.getElementById('feed-edit-wrap')
        if (editWrap) editWrap.classList.remove('hidden')
        const editLink = document.getElementById('feed-editor-link')
        if (editLink && editorOrigin) editLink.href = editorOrigin + '/editor/feed.html'
      }
    </script>
  </body>
</html>

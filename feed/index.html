<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Feed - Michael Mace</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" href="/favicon.png" />
    <meta name="color-scheme" content="light dark" />
  </head>

  <body>
    <header class="page-header">
      <p class="nav-links">
        <a href="../index.html">Home</a> ·
        <a href="../notes/index.html">Notes</a> · <a href="index.html" class="active">Feed</a> ·
        <a href="../gifs/index.html">GIFs</a>
        ·
        <a
          href="https://github.com/mmbmf1"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
      </p>
    </header>

    <main class="page-body">
    <p id="feed-edit-wrap" class="hidden">
      <a href="/editor/feed.html" class="local-edit new-note-link"
        >( + edit feed )</a
      >
    </p>

    <section id="feed-list" class="feed-list" aria-live="polite"></section>
    </main>

    <script>
      function escapeHtml(text) {
        return String(text == null ? '' : text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }

      function isSafeHref(href) {
        if (typeof href !== 'string') return false
        return /^(https?:\/\/|\/|\.{1,2}\/)/i.test(href.trim())
      }

      function addInlineStyles(text) {
        return text
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      }

      function renderInlineMd(text) {
        const raw = String(text == null ? '' : text)
        const linkRegex = /\[([^\]]+)\]\(([^)\s]+)\)/g
        let html = ''
        let last = 0
        let match
        while ((match = linkRegex.exec(raw))) {
          html += addInlineStyles(escapeHtml(raw.slice(last, match.index)))
          const label = addInlineStyles(escapeHtml(match[1]))
          const href = match[2].trim()
          if (isSafeHref(href)) {
            const external = /^https?:\/\//i.test(href)
            html += `<a href="${escapeHtml(href)}"${
              external ? ' target="_blank" rel="noopener noreferrer"' : ''
            }>${label}</a>`
          } else {
            html += addInlineStyles(escapeHtml(match[0]))
          }
          last = match.index + match[0].length
        }
        html += addInlineStyles(escapeHtml(raw.slice(last)))
        return html
      }

      function renderBodyMd(bodyMd) {
        const content = String(bodyMd == null ? '' : bodyMd).trim()
        if (!content) return ''
        const lines = content.split('\n')
        const blocks = []

        function isFenceStart(line) {
          return line.trim().startsWith('```')
        }

        function isHeading(line) {
          return /^#{1,6}\s+/.test(line.trim())
        }

        function isBlockquote(line) {
          return /^>\s?/.test(line.trim())
        }

        function isUnorderedListItem(line) {
          return /^-\s+/.test(line.trim())
        }

        function isOrderedListItem(line) {
          return /^\d+\.\s+/.test(line.trim())
        }

        function isBlockStart(line) {
          return (
            isFenceStart(line) ||
            isHeading(line) ||
            isBlockquote(line) ||
            isUnorderedListItem(line) ||
            isOrderedListItem(line)
          )
        }

        let i = 0
        while (i < lines.length) {
          const rawLine = lines[i]
          const trimmed = rawLine.trim()

          if (!trimmed) {
            i += 1
            continue
          }

          if (isFenceStart(rawLine)) {
            const langInput = trimmed.slice(3).trim().toLowerCase()
            const lang = langInput.replace(/[^a-z0-9_-]/g, '')
            const codeLines = []
            i += 1
            while (i < lines.length && !isFenceStart(lines[i])) {
              codeLines.push(lines[i])
              i += 1
            }
            if (i < lines.length && isFenceStart(lines[i])) i += 1
            blocks.push(
              `<pre><code${
                lang ? ` class="language-${escapeHtml(lang)}"` : ''
              }>${escapeHtml(codeLines.join('\n'))}</code></pre>`
            )
            continue
          }

          if (isHeading(rawLine)) {
            const match = trimmed.match(/^(#{1,6})\s+(.+)$/)
            if (match) {
              const level = String(match[1].length)
              blocks.push(`<h${level}>${renderInlineMd(match[2])}</h${level}>`)
              i += 1
              continue
            }
          }

          if (isBlockquote(rawLine)) {
            const quoteLines = []
            while (i < lines.length && isBlockquote(lines[i])) {
              quoteLines.push(lines[i].trim().replace(/^>\s?/, ''))
              i += 1
            }
            blocks.push(
              `<blockquote><p>${quoteLines.map(renderInlineMd).join('<br />')}</p></blockquote>`
            )
            continue
          }

          if (isUnorderedListItem(rawLine)) {
            const items = []
            while (i < lines.length && isUnorderedListItem(lines[i])) {
              items.push(
                `<li>${renderInlineMd(lines[i].trim().replace(/^-\s+/, ''))}</li>`
              )
              i += 1
            }
            blocks.push(`<ul>${items.join('')}</ul>`)
            continue
          }

          if (isOrderedListItem(rawLine)) {
            const items = []
            while (i < lines.length && isOrderedListItem(lines[i])) {
              items.push(
                `<li>${renderInlineMd(
                  lines[i].trim().replace(/^\d+\.\s+/, '')
                )}</li>`
              )
              i += 1
            }
            blocks.push(`<ol>${items.join('')}</ol>`)
            continue
          }

          const paragraphLines = []
          while (i < lines.length) {
            const paragraphCandidate = lines[i]
            if (!paragraphCandidate.trim()) break
            if (
              paragraphLines.length > 0 &&
              isBlockStart(paragraphCandidate)
            ) {
              break
            }
            paragraphLines.push(paragraphCandidate)
            i += 1
          }
          blocks.push(`<p>${paragraphLines.map(renderInlineMd).join('<br />')}</p>`)
        }

        return blocks.join('')
      }

      function extractYouTubeId(urlValue) {
        if (typeof urlValue !== 'string' || !urlValue.trim()) return ''
        try {
          const url = new URL(urlValue)
          const host = url.hostname.replace(/^www\./, '')
          if (host === 'youtu.be') return url.pathname.replace('/', '').trim()
          if (host === 'youtube.com' || host === 'm.youtube.com') {
            if (url.pathname === '/watch') {
              return (url.searchParams.get('v') || '').trim()
            }
            if (url.pathname.startsWith('/shorts/')) {
              return url.pathname.split('/')[2] || ''
            }
            if (url.pathname.startsWith('/embed/')) {
              return url.pathname.split('/')[2] || ''
            }
          }
        } catch (_) {}
        return ''
      }

      function renderYouTubeEmbed(urlValue) {
        const id = extractYouTubeId(urlValue)
        if (!id) return ''
        const src = `https://www.youtube.com/embed/${encodeURIComponent(id)}`
        return `<div class="feed-embed"><iframe class="youtube-embed" src="${src}" title="YouTube video" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>`
      }

      function renderImage(imageUrl) {
        if (!imageUrl || !isSafeHref(imageUrl)) return ''
        return `<div class="feed-embed"><img class="feed-image" src="${escapeHtml(
          imageUrl
        )}" alt="" loading="lazy"></div>`
      }

      function formatDate(value) {
        if (typeof value !== 'string' || !value.trim()) return ''
        const date = new Date(value)
        if (Number.isNaN(date.getTime())) return value
        return new Intl.DateTimeFormat(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
        }).format(date)
      }

      function sortableDateValue(value) {
        if (typeof value !== 'string' || !value.trim()) return null
        const raw = value.trim()
        const isoDateOnly = /^\d{4}-\d{2}-\d{2}$/.test(raw)
        const parsed = new Date(isoDateOnly ? `${raw}T00:00:00Z` : raw)
        if (Number.isNaN(parsed.getTime())) return null
        return parsed.getTime()
      }

      function sortFeedItemsByDate(items) {
        return items
          .map((item, index) => ({
            item,
            index,
            sortValue: sortableDateValue(item && item.date ? item.date : ''),
          }))
          .sort((a, b) => {
            const aHasDate = a.sortValue != null
            const bHasDate = b.sortValue != null
            if (aHasDate && bHasDate && a.sortValue !== b.sortValue) {
              return b.sortValue - a.sortValue
            }
            if (aHasDate !== bHasDate) return aHasDate ? -1 : 1
            return a.index - b.index
          })
          .map((entry) => entry.item)
      }

      function normalizeFeedItemId(rawId, index) {
        const fallback = `item-${index + 1}`
        if (typeof rawId !== 'string') return fallback
        const clean = rawId
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9._-]+/g, '-')
        return clean.replace(/^-+|-+$/g, '') || fallback
      }

      function renderRelatedLinks(links) {
        if (!Array.isArray(links) || links.length === 0) return ''
        const safeLinks = links
          .filter(
            (link) =>
              link && typeof link.url === 'string' && isSafeHref(link.url)
          )
          .map((link) => {
            const label = link.label ? String(link.label) : String(link.url)
            const external = /^https?:\/\//i.test(link.url)
            return `<li><a href="${escapeHtml(link.url)}"${
              external ? ' target="_blank" rel="noopener noreferrer"' : ''
            }>${escapeHtml(label)}</a></li>`
          })
          .join('')
        return safeLinks
          ? `<div class="feed-related"><p class="feed-meta-label">related:</p><ul>${safeLinks}</ul></div>`
          : ''
      }

      function renderSource(sourceUrl) {
        if (!isSafeHref(sourceUrl || '')) return ''
        const external = /^https?:\/\//i.test(sourceUrl)
        return `<p class="feed-source">source: <a href="${escapeHtml(
          sourceUrl
        )}"${
          external ? ' target="_blank" rel="noopener noreferrer"' : ''
        }>${escapeHtml(sourceUrl)}</a></p>`
      }

      function renderTags(tags) {
        if (!Array.isArray(tags) || tags.length === 0) return ''
        const clean = tags
          .map((tag) => String(tag || '').trim())
          .filter(Boolean)
          .map((tag) => `<li>${escapeHtml(tag)}</li>`)
          .join('')
        return clean ? `<ul class="feed-tags">${clean}</ul>` : ''
      }

      function renderItem(item, index) {
        const title =
          item && item.title ? `<h2>${escapeHtml(item.title)}</h2>` : ''
        const body = renderBodyMd(item && item.body_md ? item.body_md : '')
        const sourceUrlInput =
          item && typeof item.source_url === 'string'
            ? item.source_url.trim()
            : ''
        const embedUrlCandidate =
          item && item.embed && item.embed.type === 'youtube' && item.embed.url
            ? String(item.embed.url)
            : sourceUrlInput
        const embed = renderYouTubeEmbed(embedUrlCandidate)
        const imageUrl =
          item && typeof item.image_url === 'string'
            ? item.image_url.trim()
            : ''
        const sourceUrl =
          sourceUrlInput ||
          (/^https?:\/\//i.test(embedUrlCandidate)
            ? embedUrlCandidate
            : /^https?:\/\//i.test(imageUrl)
            ? imageUrl
            : '')
        const image = renderImage(imageUrl)
        const date = formatDate(item && item.date ? item.date : '')
        const itemId = normalizeFeedItemId(item && item.id, index)
        const dateLabel = date || 'undated'
        const tagsOnly = renderTags(item && item.tags)
        const relatedLinks = renderRelatedLinks(item && item.related_links)
        return `<article id="${escapeHtml(
          itemId
        )}" class="feed-item"><div class="feed-item-head">${title}${tagsOnly}</div><p class="feed-date"><a class="feed-permalink" href="#${escapeHtml(
          itemId
        )}" aria-label="link to this entry">#</a> ${escapeHtml(
          dateLabel
        )}</p>${relatedLinks}<div class="feed-body">${body}</div>${image}${embed}${renderSource(
          sourceUrl
        )}</article>`
      }

      async function initFeed() {
        const list = document.getElementById('feed-list')
        if (!list) return
        try {
          const response = await fetch('data.json')
          if (!response.ok) throw new Error('bad response')
          const data = await response.json()
          const items = Array.isArray(data.items) ? data.items : []
          if (items.length === 0) {
            list.innerHTML = '<p class="subtle">no feed items yet.</p>'
            return
          }
          const sortedItems = sortFeedItemsByDate(items)
          list.innerHTML = sortedItems
            .map((item, index) => renderItem(item, index))
            .join('')
        } catch (_) {
          list.innerHTML =
            '<p class="subtle">feed data did not load. check feed/data.json.</p>'
        }
      }

      initFeed()
      if (
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1'
      ) {
        const editWrap = document.getElementById('feed-edit-wrap')
        if (editWrap) editWrap.classList.remove('hidden')
      }
    </script>
  </body>
</html>

<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Michael Mace</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="/favicon.png" />
  </head>

  <body>
    <header class="page-header">
      <p class="nav-links">
        <a href="index.html" class="active">Home</a> ·
        <a href="notes/index.html">Notes</a> ·
        <a href="feed/index.html">Feed</a> · <a href="gifs/index.html">GIFs</a>
        ·
        <a
          href="https://github.com/mmbmf1"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
      </p>
      <h1 class="no-margin-bottom">Michael Mace</h1>
      <div class="home-intro">
        <p class="tagline">domestic engineer, lawn care enthusiast, black coffee connoisseur, dev</p>
        <p class="tagline">
          this is for: notes, systems, and small experiments.
        </p>
        <p class="subtle">sometimes gifs.</p>
      </div>
    </header>

    <main class="page-body">
      <section
        class="home-section home-feed-preview"
        aria-labelledby="home-recent-heading"
      >
        <div id="home-feed-body">
          <p class="subtle">loading recent entries...</p>
        </div>
      </section>

      <section
        class="home-section hours-widget"
        aria-labelledby="hours-widget-heading"
      >
        <div id="hours-widget-body">
          <p class="subtle">loading hours snapshot...</p>
        </div>
      </section>
    </main>

    <script>
      function escapeHtml(text) {
        return String(text == null ? '' : text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }

      function formatHours(value) {
        return new Intl.NumberFormat(undefined, {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        }).format(value)
      }

      function formatPercent(value) {
        return new Intl.NumberFormat(undefined, {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        }).format(value)
      }

      function formatUpdatedAt(value) {
        if (typeof value !== 'string' || !value.trim()) return ''
        const raw = value.trim()
        const iso = /^(\d{4})-(\d{2})-(\d{2})$/.exec(raw)
        const parsed = iso
          ? new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]))
          : new Date(raw)
        if (Number.isNaN(parsed.getTime())) return value
        return new Intl.DateTimeFormat(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
        }).format(parsed)
      }

      function normalizeFeedItemId(rawId, index) {
        const fallback = `item-${index + 1}`
        if (typeof rawId !== 'string') return fallback
        const clean = rawId
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9._-]+/g, '-')
        return clean.replace(/^-+|-+$/g, '') || fallback
      }

      function sortableDateValue(value) {
        if (typeof value !== 'string' || !value.trim()) return null
        const raw = value.trim()
        const iso = /^(\d{4})-(\d{2})-(\d{2})$/.exec(raw)
        if (iso) {
          const local = new Date(
            Number(iso[1]),
            Number(iso[2]) - 1,
            Number(iso[3])
          )
          if (Number.isNaN(local.getTime())) return null
          return local.getTime()
        }
        const parsed = new Date(raw)
        if (Number.isNaN(parsed.getTime())) return null
        return parsed.getTime()
      }

      function sortFeedItemsByDate(items) {
        return items
          .map((item, index) => ({
            item,
            index,
            sortValue: sortableDateValue(item && item.date ? item.date : ''),
          }))
          .sort((a, b) => {
            const aHasDate = a.sortValue != null
            const bHasDate = b.sortValue != null
            if (aHasDate && bHasDate && a.sortValue !== b.sortValue) {
              return b.sortValue - a.sortValue
            }
            if (aHasDate !== bHasDate) return aHasDate ? -1 : 1
            return a.index - b.index
          })
          .map((entry) => entry.item)
      }

      function stripInlineMarkdown(text) {
        return String(text == null ? '' : text)
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1')
          .replace(/`([^`]+)`/g, '$1')
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          .replace(/\*([^*]+)\*/g, '$1')
      }

      function firstLineSnippet(item) {
        const title =
          item && typeof item.title === 'string' ? item.title.trim() : ''
        if (title) return title
        const body =
          item && typeof item.body_md === 'string' ? item.body_md.trim() : ''
        if (!body) return 'untitled entry'
        const firstLine = body.split('\n').find((line) => line.trim()) || body
        const cleaned = stripInlineMarkdown(firstLine)
          .replace(/^-+\s*/, '')
          .trim()
        if (!cleaned) return 'untitled entry'
        if (cleaned.length <= 120) return cleaned
        return cleaned.slice(0, 117).trimEnd() + '...'
      }

      async function initHoursWidget() {
        const container = document.getElementById('hours-widget-body')
        if (!container) return
        try {
          const response = await fetch('data/git-hours.json')
          if (!response.ok) throw new Error('bad response')
          const data = await response.json()
          const hours =
            typeof data.hours === 'number' && Number.isFinite(data.hours)
              ? data.hours
              : null
          const progress =
            typeof data.progress_pct === 'number' &&
            Number.isFinite(data.progress_pct)
              ? data.progress_pct
              : null
          const updatedAt = formatUpdatedAt(data.updated_at)

          if (hours == null || progress == null) {
            container.innerHTML =
              '<p class="subtle">hours snapshot is incomplete.</p>'
            return
          }

          const pct = Math.min(100, Math.max(0, progress))
          container.innerHTML =
            '<p class="hours-summary"><strong>' +
            formatHours(hours) +
            ' hours</strong> · ' +
            formatPercent(progress) +
            '% toward 10,000</p>' +
            '<div class="hours-progress" role="progressbar" aria-valuenow="' +
            String(pct) +
            '" aria-valuemin="0" aria-valuemax="100" aria-label="Progress toward 10,000 hours">' +
            '<div class="hours-progress-fill" style="width:' +
            String(pct) +
            '%"></div></div>' +
            '<p class="hours-meta">updated ' +
            (updatedAt || 'recently') +
            '</p>' +
            '<p class="hours-source">source: <a href="data/git-hours.json">/data/git-hours.json</a></p>'
        } catch (_) {
          container.innerHTML =
            '<p class="subtle">hours snapshot unavailable right now.</p>'
        }
      }

      async function initHomeFeedPreview() {
        const container = document.getElementById('home-feed-body')
        if (!container) return
        try {
          const response = await fetch('feed/data.json')
          if (!response.ok) throw new Error('bad response')
          const data = await response.json()
          const allItems = Array.isArray(data.items) ? data.items : []
          const items = sortFeedItemsByDate(allItems).slice(0, 3)
          if (items.length === 0) {
            container.innerHTML =
              '<p class="subtle">feed is quiet right now.</p><p><a href="feed/index.html">open feed</a></p>'
            return
          }
          const listHtml = items
            .map((item, index) => {
              const itemId = normalizeFeedItemId(item && item.id, index)
              const label = firstLineSnippet(item)
              const date = formatUpdatedAt(item && item.date)
              const datePrefix = date
                ? `<span class="home-feed-date">${escapeHtml(date)} · </span>`
                : ''
              return `<li><a href="feed/index.html#${escapeHtml(
                itemId
              )}">${datePrefix}${escapeHtml(label)}</a></li>`
            })
            .join('')
          container.innerHTML = `<ul class="home-feed-list">${listHtml}</ul><p class="home-feed-more"><a href="feed/index.html">open full feed</a></p>`
        } catch (_) {
          container.innerHTML =
            '<p class="subtle">could not load feed preview.</p>'
        }
      }

      initHoursWidget()
      initHomeFeedPreview()
    </script>
  </body>
</html>
